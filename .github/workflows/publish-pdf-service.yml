name: Build and Publish Playwright PDF Service

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: server/generate-certificate-pdf
          file: server/generate-certificate-pdf/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/eduflow-cert-pdf:latest
            ghcr.io/${{ github.repository_owner }}/eduflow-cert-pdf:${{ github.sha }}
